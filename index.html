    <link rel="icon" type="image/png" href="/icon.png" />
    <!-- Viewport optimized for Android Terminals: Disables zooming for a native app feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#008000" />
    <meta name="description" content="Fast horse racing betting terminal system" />

    <!-- Service Worker Registration for offline support and caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js?v=20260525-1').catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </head>
  <body class="bg-gray-100">

    <script type="module" src="/index.tsx"></script>
