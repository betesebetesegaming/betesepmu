    <!-- Viewport optimized for Android Terminals: Disables zooming for a native app feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#008000" />
    <title>Betese PMU System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'betese-green': '#008000',
              'betese-yellow': '#FFFF00',
              'betese-dark': '#008000',
            },
          },
        },
      }
    </script>
    <style>
      /* High-contrast styles for printing via html2canvas */
      .print-mode, .print-mode * {
        color: #000000 !important;
        background-color: #ffffff !important;
        background-image: none !important;
        border-color: #000000 !important;
        
        /* FORCE EXTREME BOLDNESS/DARKNESS */
        font-weight: 900 !important;
        
        /* OPTIMIZE TEXT FOR THERMAL PRINTING (Sharp edges) */
        text-rendering: geometricPrecision !important;
        -webkit-font-smoothing: none !important;
        
        /* Performance optimizations for html2canvas */
        text-shadow: none !important;
        box-shadow: none !important;
        filter: none !important;
        backdrop-filter: none !important;
        transform: none !important;
        
        -webkit-print-color-adjust: exact;
        color-adjust: exact;
      }
      .print-mode .printable-content {
        border: none !important;
        padding: 0 !important;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
