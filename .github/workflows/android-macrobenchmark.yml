name: Android Macrobenchmark (Firebase Test Lab)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target package to benchmark
        required: true
        default: full
        type: choice
        options:
          - full
          - lite
      device_model:
        description: Firebase Test Lab device model
        required: true
        default: oriole
        type: string
      android_version:
        description: Android API level on test device
        required: true
        default: "33"
        type: string

jobs:
  macrobenchmark:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install JS dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build app + benchmark APKs
        working-directory: android
        run: |
          ./gradlew :app:assembleDebug :app:assemblePosliteDebug :benchmark:assembleRelease --no-daemon

      - name: Resolve benchmark target
        id: target
        run: |
          if [ "${{ github.event.inputs.target }}" = "lite" ]; then
            echo "pkg=com.betese.pmu.poslite" >> "$GITHUB_OUTPUT"
            echo "apk=android/app/build/outputs/apk/poslite/debug/app-poslite-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "pkg=com.betese.pmu" >> "$GITHUB_OUTPUT"
            echo "apk=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run macrobenchmark on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app "${{ steps.target.outputs.apk }}" \
            --test "android/benchmark/build/outputs/apk/release/benchmark-release.apk" \
            --device "model=${{ github.event.inputs.device_model }},version=${{ github.event.inputs.android_version }},locale=en,orientation=portrait" \
            --environment-variables "targetPackage=${{ steps.target.outputs.pkg }},androidx.benchmark.output.enable=true" \
            --timeout 20m \
            --results-dir "macrobenchmark/${{ github.run_id }}-${{ github.event.inputs.target }}"
